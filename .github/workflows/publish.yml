name: Publish

on:
  push:
    branches:
      - main

concurrency: publish-${{ github.ref }}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the version branch + git tags
      pull-requests: write # open/update the Version Packages PR
      id-token: write # npm trusted publishing (OIDC) — no NPM_TOKEN needed
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      # Commit/push the version PR as the bot.
      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # Versions if changelogs are pending (opens a Version Packages PR),
      # otherwise publishes from the committed publish lock.
      - name: Version & publish
        run: node scripts/tegami.mts ci
        env:
          GITHUB_TOKEN: ${{ github.token }}
